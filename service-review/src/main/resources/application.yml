spring:
  application:
    name: service-review
  datasource:
    url: jdbc:postgresql://localhost:5432/kerjapro
    username: kerjapro
    password: kerjapro_pass
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false

server:
  port: 8084

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: local | local-no-kafka
