spring:
  application:
    name: service-contractor
  datasource:
    url: jdbc:postgresql://localhost:5432/kerjapro
    username: kerjapro
    password: kerjapro_pass
    hikari:
      auto-commit: false
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration/public
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: service-contractor
  data:
    redis:
      host: localhost
      port: 6379
      password: kerjapro_redis_pass

server:
  port: 8081

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

---
spring:
  config:
    activate:
      on-profile: local
  security:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: local-no-kafka
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
