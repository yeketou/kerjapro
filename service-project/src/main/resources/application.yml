spring:
  application:
    name: service-project
  datasource:
    url: jdbc:postgresql://localhost:5432/kerjapro
    username: kerjapro
    password: kerjapro_pass
    hikari:
      auto-commit: false
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false  # service-contractor owns public schema migrations

server:
  port: 8082

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: local | local-no-kafka
  security:
    enabled: false
